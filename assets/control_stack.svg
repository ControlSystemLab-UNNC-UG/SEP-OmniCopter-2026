<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620"><stop stop-color="#0b1220"/><stop offset="1" stop-color="#17243b"/></linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0 0 L0 8 L11 4 z" fill="#8ed8ff"/></marker>
    <style>.h{font:800 36px Inter,Arial;fill:#f5fbff}.p{font:500 18px Inter,Arial;fill:#b9d8ee}.box{fill:#ffffff;opacity:.08;stroke:#7fcfff;stroke-width:2}.box2{fill:#ffffff;opacity:.1;stroke:#ffcf5a;stroke-width:2}.t{font:800 19px Inter,Arial;fill:#f9fdff}.s{font:500 14px Inter,Arial;fill:#c8eaff}.a{stroke:#8ed8ff;stroke-width:3;marker-end:url(#arr);fill:none}.d{stroke:#ffcf5a;stroke-width:3;marker-end:url(#arr);fill:none;stroke-dasharray:7 7}.tag{font:700 14px Inter,Arial;fill:#08111f}</style>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#bg)"/>
  <text x="46" y="64" class="h">Research control stack</text>
  <text x="46" y="96" class="p">From desired 6D motion to robust, fault-aware motor commands.</text>
  <g transform="translate(45 145)">
    <rect x="0" y="0" width="200" height="95" rx="18" class="box"/><text x="24" y="35" class="t">Reference</text><text x="24" y="62" class="s">trajectory, attitude,</text><text x="24" y="81" class="s">mission constraints</text>
    <rect x="250" y="0" width="220" height="95" rx="18" class="box"/><text x="274" y="35" class="t">Optimal Control</text><text x="274" y="62" class="s">MPC / QP / energy</text><text x="274" y="81" class="s">and actuator constraints</text>
    <rect x="520" y="0" width="220" height="95" rx="18" class="box"/><text x="544" y="35" class="t">Robust Control</text><text x="544" y="62" class="s">disturbance observer,</text><text x="544" y="81" class="s">uncertainty handling</text>
    <rect x="790" y="0" width="220" height="95" rx="18" class="box2"/><text x="814" y="35" class="t">Control Allocation</text><text x="814" y="62" class="s">6D wrench -> 8 or 6</text><text x="814" y="81" class="s">bidirectional rotors</text>
    <rect x="1060" y="0" width="120" height="95" rx="18" class="box"/><text x="1082" y="35" class="t">Vehicle</text><text x="1082" y="62" class="s">hardware</text><text x="1082" y="81" class="s">+ sensors</text>
    <path d="M200 47 L245 47" class="a"/><path d="M470 47 L515 47" class="a"/><path d="M740 47 L785 47" class="a"/><path d="M1010 47 L1055 47" class="a"/>
  </g>
  <g transform="translate(45 310)">
    <rect x="0" y="0" width="240" height="120" rx="18" class="box"/><text x="25" y="35" class="t">State Estimation</text><text x="25" y="64" class="s">IMU, attitude, velocity,</text><text x="25" y="84" class="s">motor feedback, logs</text>
    <rect x="335" y="0" width="260" height="120" rx="18" class="box2"/><text x="360" y="35" class="t">Fault Diagnosis</text><text x="360" y="64" class="s">residuals, observers,</text><text x="360" y="84" class="s">loss-of-effectiveness</text>
    <rect x="680" y="0" width="290" height="120" rx="18" class="box2"/><text x="705" y="35" class="t">Fault-Tolerant Control</text><text x="705" y="64" class="s">reconfigure allocation,</text><text x="705" y="84" class="s">graceful degradation</text>
    <path d="M1060 -118 C1015 60 860 105 972 60" class="d"/>
    <path d="M240 58 L330 58" class="a"/><path d="M595 58 L675 58" class="a"/>
    <path d="M970 58 C1085 55 1115 -50 1010 -130" class="d"/>
  </g>
  <g transform="translate(45 500)">
    <rect x="0" y="0" width="170" height="38" rx="19" fill="#7fffd4"/><text x="18" y="25" class="tag">stable tracking</text>
    <rect x="190" y="0" width="190" height="38" rx="19" fill="#ffcf5a"/><text x="208" y="25" class="tag">low energy allocation</text>
    <rect x="400" y="0" width="220" height="38" rx="19" fill="#bda7ff"/><text x="418" y="25" class="tag">disturbance rejection</text>
    <rect x="640" y="0" width="220" height="38" rx="19" fill="#ff8fb3"/><text x="658" y="25" class="tag">fault-aware recovery</text>
  </g>
</svg>
