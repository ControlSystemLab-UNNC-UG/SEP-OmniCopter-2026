<svg width="1200" height="560" viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560"><stop stop-color="#0b1220"/><stop offset="1" stop-color="#241633"/></linearGradient>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto"><path d="M0 0 L0 8 L10 4 z" fill="#8ed8ff"/></marker>
    <style>.h{font:800 34px Inter,Arial;fill:#f5fbff}.p{font:500 18px Inter,Arial;fill:#cbd8ff}.box{fill:#fff;opacity:.09;stroke:#8ed8ff;stroke-width:2}.warn{fill:#fff;opacity:.11;stroke:#ff8fb3;stroke-width:2}.t{font:800 19px Inter,Arial;fill:#f7fbff}.s{font:500 15px Inter,Arial;fill:#dbefff}.a{stroke:#8ed8ff;stroke-width:3;marker-end:url(#arr);fill:none}.r{stroke:#ff8fb3;stroke-width:4;stroke-linecap:round}.ok{stroke:#7fffd4;stroke-width:4;stroke-linecap:round}.tag{font:700 14px Inter,Arial;fill:#08111f}</style>
  </defs>
  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text x="46" y="64" class="h">Fault diagnosis and fault-tolerant control</text>
  <text x="46" y="98" class="p">Detect abnormal actuator/sensor behavior, isolate the fault, then reconfigure the allocation problem.</text>
  <g transform="translate(55 145)">
    <rect x="0" y="0" width="230" height="115" rx="18" class="box"/><text x="24" y="38" class="t">Measurements</text><text x="24" y="68" class="s">IMU, attitude, RPM,</text><text x="24" y="90" class="s">current, voltage, logs</text>
    <rect x="310" y="0" width="230" height="115" rx="18" class="box"/><text x="334" y="38" class="t">Residual Generator</text><text x="334" y="68" class="s">model prediction vs.</text><text x="334" y="90" class="s">actual acceleration</text>
    <rect x="620" y="0" width="230" height="115" rx="18" class="warn"/><text x="644" y="38" class="t">Fault Isolation</text><text x="644" y="68" class="s">which motor / ESC /</text><text x="644" y="90" class="s">sensor is degraded?</text>
    <rect x="930" y="0" width="230" height="115" rx="18" class="box"/><text x="954" y="38" class="t">Reallocation</text><text x="954" y="68" class="s">update constraints,</text><text x="954" y="90" class="s">redistribute wrench</text>
    <path d="M230 58 L305 58" class="a"/><path d="M540 58 L615 58" class="a"/><path d="M850 58 L925 58" class="a"/>
  </g>
  <g transform="translate(90 330)">
    <rect x="0" y="0" width="1020" height="90" rx="20" fill="#fff" opacity=".06" stroke="#8ed8ff"/>
    <line x1="50" y1="45" x2="240" y2="45" class="ok"/><line x1="250" y1="45" x2="360" y2="45" class="r"/><line x1="370" y1="45" x2="560" y2="45" class="ok"/><line x1="570" y1="45" x2="690" y2="45" class="r"/><line x1="700" y1="45" x2="970" y2="45" class="ok"/>
    <text x="48" y="74" class="s">normal</text><text x="270" y="30" class="s">residual spike</text><text x="585" y="30" class="s">loss of effectiveness</text><text x="805" y="74" class="s">recovered command</text>
  </g>
  <g transform="translate(55 470)">
    <rect x="0" y="0" width="180" height="38" rx="19" fill="#ff8fb3"/><text x="18" y="25" class="tag">motor fault</text>
    <rect x="200" y="0" width="160" height="38" rx="19" fill="#ffcf5a"/><text x="218" y="25" class="tag">ESC issue</text>
    <rect x="380" y="0" width="170" height="38" rx="19" fill="#bda7ff"/><text x="398" y="25" class="tag">sensor bias</text>
    <rect x="570" y="0" width="230" height="38" rx="19" fill="#7fffd4"/><text x="588" y="25" class="tag">fault-tolerant allocation</text>
  </g>
</svg>
