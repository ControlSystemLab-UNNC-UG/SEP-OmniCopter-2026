<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="900" y2="520"><stop stop-color="#111020"/><stop offset="1" stop-color="#2d173f"/></linearGradient>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="#ffcf5a"/></marker>
    <style>.h{font:800 34px Inter,Arial;fill:#f5fbff}.p{font:500 18px Inter,Arial;fill:#d8c8ff}.wire{stroke:#caa7ff;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.g{stroke:#caa7ff;stroke-width:4;opacity:.36}.rotor{fill:#fbfdff;stroke:#111020;stroke-width:5}.th{stroke:#ffcf5a;stroke-width:4;marker-end:url(#a);stroke-linecap:round}.lab{font:700 16px Inter,Arial;fill:#f2e9ff}.badge{font:700 15px Inter,Arial;fill:#111020}</style>
  </defs>
  <rect width="900" height="520" rx="28" fill="url(#b)"/>
  <text x="48" y="66" class="h">Lynchpin-style tangential geometry</text>
  <text x="48" y="98" class="p">A modular 6-DoF concept built around a collapsed-dodecahedron-inspired frame.</text>
  <g transform="translate(305 92)">
    <polygon points="180,28 325,112 325,280 180,364 35,280 35,112" fill="#ffffff" opacity=".05" stroke="#f1dcff" stroke-width="3"/>
    <polygon points="180,86 275,140 275,252 180,306 85,252 85,140" fill="#ffffff" opacity=".05" stroke="#f1dcff" stroke-width="3"/>
    <line x1="180" y1="28" x2="180" y2="86" class="g"/><line x1="325" y1="112" x2="275" y2="140" class="g"/><line x1="325" y1="280" x2="275" y2="252" class="g"/>
    <line x1="180" y1="364" x2="180" y2="306" class="g"/><line x1="35" y1="280" x2="85" y2="252" class="g"/><line x1="35" y1="112" x2="85" y2="140" class="g"/>
    <line x1="180" y1="28" x2="325" y2="112" class="wire"/><line x1="325" y1="112" x2="325" y2="280" class="wire"/><line x1="325" y1="280" x2="180" y2="364" class="wire"/>
    <line x1="180" y1="364" x2="35" y2="280" class="wire"/><line x1="35" y1="280" x2="35" y2="112" class="wire"/><line x1="35" y1="112" x2="180" y2="28" class="wire"/>
    <circle cx="180" cy="28" r="29" class="rotor"/><circle cx="325" cy="112" r="29" class="rotor"/><circle cx="325" cy="280" r="29" class="rotor"/>
    <circle cx="180" cy="364" r="29" class="rotor"/><circle cx="35" cy="280" r="29" class="rotor"/><circle cx="35" cy="112" r="29" class="rotor"/>
    <line x1="180" y1="28" x2="220" y2="-28" class="th"/><line x1="325" y1="112" x2="395" y2="120" class="th"/><line x1="325" y1="280" x2="390" y2="318" class="th"/>
    <line x1="180" y1="364" x2="140" y2="420" class="th"/><line x1="35" y1="280" x2="-35" y2="272" class="th"/><line x1="35" y1="112" x2="-30" y2="75" class="th"/>
    <text x="120" y="202" class="lab">tangential</text><text x="130" y="225" class="lab">thrust shell</text>
  </g>
  <g transform="translate(48 142)">
    <rect x="0" y="0" width="210" height="36" rx="18" fill="#bda7ff"/><text x="18" y="24" class="badge">modular geometry</text>
    <rect x="0" y="52" width="210" height="36" rx="18" fill="#ffcf5a"/><text x="18" y="76" class="badge">tangential flight</text>
    <rect x="0" y="104" width="210" height="36" rx="18" fill="#7fffd4"/><text x="18" y="128" class="badge">orientation independent</text>
    <text x="0" y="188" class="p">Design logic</text>
    <text x="0" y="222" class="lab">1. Place thrust axes around a 3D shell</text>
    <text x="0" y="250" class="lab">2. Keep position and attitude commands independent</text>
    <text x="0" y="278" class="lab">3. Favor modularity and 6-DoF demonstrations</text>
  </g>
</svg>
