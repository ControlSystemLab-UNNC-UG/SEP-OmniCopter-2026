<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="900" y2="520"><stop stop-color="#0b1220"/><stop offset="1" stop-color="#102a42"/></linearGradient>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0 L0 6 L9 3 z" fill="#ffcc66"/></marker>
    <style>.h{font:800 34px Inter,Arial;fill:#f5fbff}.p{font:500 18px Inter,Arial;fill:#b9d8ee}.wire{stroke:#8cc8ff;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.ghost{stroke:#8cc8ff;stroke-width:7;opacity:.42;stroke-linecap:round;stroke-linejoin:round}.rotor{fill:#f7fdff;stroke:#0b1220;stroke-width:5}.th{stroke:#ffcc66;stroke-width:4;marker-end:url(#a);stroke-linecap:round}.lab{font:700 16px Inter,Arial;fill:#d8f7ff}.badge{font:700 15px Inter,Arial;fill:#08111f}</style>
  </defs>
  <rect width="900" height="520" rx="28" fill="url(#b)"/>
  <text x="48" y="66" class="h">ETH-style cubic Omnicopter</text>
  <text x="48" y="98" class="p">Eight reversible fixed-pitch rotors placed around a symmetric cube-like frame.</text>
  <g transform="translate(238 115)">
    <line x1="75" y1="75" x2="425" y2="75" class="wire"/><line x1="75" y1="325" x2="425" y2="325" class="wire"/>
    <line x1="75" y1="75" x2="75" y2="325" class="wire"/><line x1="425" y1="75" x2="425" y2="325" class="wire"/>
    <line x1="160" y1="20" x2="510" y2="20" class="ghost"/><line x1="510" y1="20" x2="425" y2="75" class="ghost"/><line x1="160" y1="20" x2="75" y2="75" class="ghost"/>
    <line x1="160" y1="270" x2="510" y2="270" class="ghost"/><line x1="160" y1="20" x2="160" y2="270" class="ghost"/><line x1="510" y1="20" x2="510" y2="270" class="ghost"/>
    <line x1="160" y1="270" x2="75" y2="325" class="ghost"/><line x1="510" y1="270" x2="425" y2="325" class="ghost"/>
    <circle cx="75" cy="75" r="31" class="rotor"/><circle cx="425" cy="75" r="31" class="rotor"/><circle cx="75" cy="325" r="31" class="rotor"/><circle cx="425" cy="325" r="31" class="rotor"/>
    <circle cx="160" cy="20" r="27" class="rotor"/><circle cx="510" cy="20" r="27" class="rotor"/><circle cx="160" cy="270" r="27" class="rotor"/><circle cx="510" cy="270" r="27" class="rotor"/>
    <line x1="75" y1="75" x2="20" y2="25" class="th"/><line x1="425" y1="75" x2="500" y2="30" class="th"/><line x1="75" y1="325" x2="20" y2="385" class="th"/><line x1="425" y1="325" x2="510" y2="382" class="th"/>
    <line x1="160" y1="20" x2="120" y2="-20" class="th"/><line x1="510" y1="20" x2="570" y2="-15" class="th"/><line x1="160" y1="270" x2="115" y2="315" class="th"/><line x1="510" y1="270" x2="570" y2="315" class="th"/>
  </g>
  <g transform="translate(48 142)">
    <rect x="0" y="0" width="190" height="36" rx="18" fill="#7fffd4"/><text x="18" y="24" class="badge">8 rotors</text>
    <rect x="0" y="52" width="190" height="36" rx="18" fill="#ffcc66"/><text x="18" y="76" class="badge">bidirectional thrust</text>
    <rect x="0" y="104" width="190" height="36" rx="18" fill="#bda7ff"/><text x="18" y="128" class="badge">large null space</text>
    <text x="0" y="188" class="p">Design logic</text>
    <text x="0" y="222" class="lab">1. Use symmetry for near-isotropic dynamics</text>
    <text x="0" y="250" class="lab">2. Tilt thrust axes to span 3D force/torque</text>
    <text x="0" y="278" class="lab">3. Allocate a 6D wrench to 8 motors</text>
  </g>
</svg>
